<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Starting Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: #FFF8F0;
    position: relative;
  }

  /* Fondo con patrón de puntos */
  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #F4C49A 1.5px, transparent 1.5px);
    background-size: 40px 40px;
    opacity: 0.35;
  }

  /* Círculos decorativos de fondo */
  .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
  }
  .c1 { width: 600px; height: 600px; background: #FFB7D5; top: -150px; left: -150px; }
  .c2 { width: 400px; height: 400px; background: #F4C49A; bottom: -100px; right: -100px; }
  .c3 { width: 200px; height: 200px; background: #FFB7D5; bottom: 100px; left: 200px; }
  .c4 { width: 150px; height: 150px; background: #F4C49A; top: 80px; right: 300px; }

  /* Flores flotantes decorativas */
  .floaties {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .floaty {
    position: absolute;
    font-size: 28px;
    animation: floatAround 8s ease-in-out infinite;
    opacity: 0.6;
  }

  .floaty:nth-child(1)  { top: 8%;  left: 5%;   animation-delay: 0s;   font-size: 32px; }
  .floaty:nth-child(2)  { top: 15%; right: 8%;  animation-delay: 1s;   font-size: 24px; }
  .floaty:nth-child(3)  { top: 70%; left: 4%;   animation-delay: 2s;   font-size: 28px; }
  .floaty:nth-child(4)  { top: 80%; right: 6%;  animation-delay: 3s;   font-size: 36px; }
  .floaty:nth-child(5)  { top: 45%; left: 2%;   animation-delay: 1.5s; font-size: 22px; }
  .floaty:nth-child(6)  { top: 5%;  left: 45%;  animation-delay: 2.5s; font-size: 20px; }
  .floaty:nth-child(7)  { top: 88%; left: 42%;  animation-delay: 0.5s; font-size: 26px; }
  .floaty:nth-child(8)  { top: 55%; right: 3%;  animation-delay: 3.5s; font-size: 24px; }

  @keyframes floatAround {
    0%,100% { transform: translateY(0) rotate(0deg); }
    33%      { transform: translateY(-15px) rotate(5deg); }
    66%      { transform: translateY(8px) rotate(-5deg); }
  }

  /* Layout principal */
  .main {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
  }

  /* Panel izquierdo — nombre y mensaje */
  .left-panel {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 24px;
    animation: fadeSlideLeft 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes fadeSlideLeft {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .channel-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FDDCB5;
    border: 2.5px solid #F4C49A;
    border-radius: 50px;
    padding: 8px 20px 8px 12px;
  }

  .channel-badge span { font-size: 22px; }
  .channel-badge p {
    font-size: 14px;
    font-weight: 800;
    color: #C47A35;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .main-title {
    font-family: 'Pacifico', cursive;
    font-size: 90px;
    color: #C47A35;
    line-height: 1;
    text-shadow: 5px 5px 0px #FDDCB5;
  }

  .main-title .pink { color: #FF8FB3; text-shadow: 5px 5px 0px #FFD6E7; }

  .subtitle {
    font-size: 22px;
    font-weight: 700;
    color: #B8A090;
    letter-spacing: 1px;
  }

  .decorative-line {
    width: 200px;
    height: 4px;
    background: linear-gradient(to right, #F4C49A, #FFB7D5);
    border-radius: 4px;
  }

  .social-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .social-pill {
    background: #FFF8F0;
    border: 2px solid #F4C49A;
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 800;
    color: #C47A35;
  }

  /* Panel derecho — countdown */
  .right-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeSlideRight 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes fadeSlideRight {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .countdown-card {
    background: #FFF8F0;
    border: 3px solid #F4C49A;
    border-radius: 32px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 6px 6px 0px #F4C49A;
    position: relative;
    overflow: hidden;
  }

  .countdown-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,183,213,0.15), transparent 60%);
  }

  .countdown-label {
    font-family: 'Pacifico', cursive;
    font-size: 16px;
    color: #FF8FB3;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .countdown-time {
    font-family: 'Pacifico', cursive;
    font-size: 110px;
    color: #C47A35;
    line-height: 1;
    letter-spacing: 4px;
    text-shadow: 4px 4px 0px #FDDCB5;
    font-variant-numeric: tabular-nums;
  }

  .countdown-time.urgent { color: #FF8FB3; text-shadow: 4px 4px 0px #FFD6E7; }

  .countdown-sub {
    font-size: 16px;
    font-weight: 700;
    color: #B8A090;
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* Barrita de progreso */
  .progress-wrap {
    width: 340px;
    background: #FDDCB5;
    border-radius: 20px;
    height: 10px;
    border: 1.5px solid #F4C49A;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, #F4C49A, #FFB7D5);
    border-radius: 20px;
    width: 100%;
    transition: width 1s linear;
  }

  /* Decoración gato abajo */
  .cat-bottom {
    font-size: 48px;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  /* Estado de espera cuando no hay cuenta regresiva */
  .waiting-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .dot-anim {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #F4C49A;
    animation: dotPulse 1.4s ease-in-out infinite;
  }

  .dot-anim:nth-child(2) { animation-delay: 0.2s; background: #FFB7D5; }
  .dot-anim:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%,80%,100% { transform: scale(0.7); opacity: 0.5; }
    40%          { transform: scale(1.1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="bg-dots"></div>

<div class="floaties">
  <div class="floaty">🌸</div>
  <div class="floaty">☕</div>
  <div class="floaty">✨</div>
  <div class="floaty">🍵</div>
  <div class="floaty">🌷</div>
  <div class="floaty">⭐</div>
  <div class="floaty">🌼</div>
  <div class="floaty">💛</div>
</div>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>
<div class="circle c4"></div>

<div class="main">

  <div class="left-panel">
    <div class="channel-badge">
      <span>🐱</span>
      <p>elizabethidalgodg</p>
    </div>
    <div class="main-title">
      starting<br><span class="pink">soon~</span>
    </div>
    <div class="decorative-line"></div>
    <div class="subtitle">preparando el espacio de trabajo ☕</div>
    <div class="social-row">
      <div class="social-pill">twitch.tv/elizabethidalgodg</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="countdown-card">
      <div class="countdown-label">comenzamos en</div>
      <div class="countdown-time" id="countdownDisplay">--:--</div>
      <div class="countdown-sub" id="countdownSub">escribe !brb [min] para iniciar</div>
      <div class="waiting-dots" id="waitingDots">
        <div class="dot-anim"></div>
        <div class="dot-anim"></div>
        <div class="dot-anim"></div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="cat-bottom">🐱</div>
  </div>

</div>

<script>
const TWITCH_CHANNEL = 'elizabethidalgodg';
const TU_USUARIO     = 'elizabethidalgodg';

let totalSecs   = 0;
let secondsLeft = 0;
let interval    = null;

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function startCountdown(mins) {
  clearInterval(interval);
  totalSecs   = mins * 60;
  secondsLeft = totalSecs;

  document.getElementById('waitingDots').style.display = 'none';
  document.getElementById('countdownDisplay').textContent = fmt(secondsLeft);
  document.getElementById('countdownSub').textContent = '¡ya casi estamos! ✨';
  document.getElementById('progressBar').style.width = '100%';

  interval = setInterval(() => {
    if (secondsLeft <= 0) {
      clearInterval(interval);
      document.getElementById('countdownDisplay').textContent = '¡ya!';
      document.getElementById('countdownSub').textContent = '¡comenzamos ahora! 🎉';
      document.getElementById('progressBar').style.width = '0%';
      return;
    }
    secondsLeft--;
    document.getElementById('countdownDisplay').textContent = fmt(secondsLeft);
    document.getElementById('progressBar').style.width = Math.round((secondsLeft / totalSecs) * 100) + '%';

    if (secondsLeft <= 30) {
      document.getElementById('countdownDisplay').classList.add('urgent');
    }
  }, 1000);
}

function handleCommand(user, msg) {
  if (user !== TU_USUARIO) return;
  const lower = msg.trim().toLowerCase();
  const match = lower.match(/^!brb\s+(\d+)$/);
  if (match) startCountdown(parseInt(match[1]));
  else if (lower === '!brb') startCountdown(5);
}

function connectToChat() {
  const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws.onopen = () => {
    ws.send('PASS oauth:notoken');
    ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
    ws.send('JOIN #' + TWITCH_CHANNEL);
  };
  ws.onmessage = (event) => {
    const raw = event.data;
    if (raw.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }
    const match = raw.match(/:(\w+)!\w+@\w+\.tmi\.twitch\.tv PRIVMSG #\S+ :(.+)/);
    if (match) handleCommand(match[1].toLowerCase(), match[2].trim());
  };
  ws.onclose = () => setTimeout(connectToChat, 5000);
}

document.addEventListener('DOMContentLoaded', function() {
  connectToChat();
});
</script>
</body>
</html>
