<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fin del Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: #FFF0F7;
    position: relative;
  }

  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #FFB7D5 1.5px, transparent 1.5px);
    background-size: 40px 40px;
    opacity: 0.3;
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
  }
  .c1 { width: 700px; height: 700px; background: #F4C49A; top: -200px; right: -150px; }
  .c2 { width: 400px; height: 400px; background: #FFB7D5; bottom: -100px; left: -100px; }
  .c3 { width: 200px; height: 200px; background: #F4C49A; top: 100px; left: 250px; }

  .floaties { position: absolute; inset: 0; pointer-events: none; }
  .floaty {
    position: absolute;
    font-size: 28px;
    animation: floatAround 8s ease-in-out infinite;
    opacity: 0.55;
  }
  .floaty:nth-child(1) { top: 6%;  left: 4%;   animation-delay: 0s;   font-size: 34px; }
  .floaty:nth-child(2) { top: 12%; right: 6%;  animation-delay: 1s;   font-size: 26px; }
  .floaty:nth-child(3) { top: 72%; left: 3%;   animation-delay: 2s;   font-size: 30px; }
  .floaty:nth-child(4) { top: 82%; right: 5%;  animation-delay: 3s;   font-size: 36px; }
  .floaty:nth-child(5) { top: 48%; left: 1.5%; animation-delay: 1.5s; font-size: 22px; }
  .floaty:nth-child(6) { top: 4%;  left: 44%;  animation-delay: 2.5s; font-size: 20px; }
  .floaty:nth-child(7) { top: 90%; left: 44%;  animation-delay: 0.5s; font-size: 28px; }
  .floaty:nth-child(8) { top: 58%; right: 2%;  animation-delay: 3.5s; font-size: 24px; }

  @keyframes floatAround {
    0%,100% { transform: translateY(0) rotate(0deg); }
    33%      { transform: translateY(-15px) rotate(5deg); }
    66%      { transform: translateY(8px) rotate(-5deg); }
  }

  .main {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 70px;
  }

  /* Panel izquierdo */
  .left-panel {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 28px;
    animation: fadeSlideLeft 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes fadeSlideLeft {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .channel-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FFD6E7;
    border: 2.5px solid #FFB7D5;
    border-radius: 50px;
    padding: 8px 20px 8px 12px;
  }
  .channel-badge span { font-size: 22px; }
  .channel-badge p { font-size: 14px; font-weight: 800; color: #D4679A; letter-spacing: 2px; text-transform: uppercase; }

  .main-title {
    font-family: 'Pacifico', cursive;
    font-size: 90px;
    color: #D4679A;
    line-height: 1;
    text-shadow: 5px 5px 0px #FFD6E7;
  }
  .main-title .orange { color: #C47A35; text-shadow: 5px 5px 0px #FDDCB5; }

  .subtitle {
    font-size: 22px;
    font-weight: 700;
    color: #C4A0B8;
    letter-spacing: 1px;
    max-width: 560px;
    line-height: 1.5;
  }

  .decorative-line {
    width: 200px;
    height: 4px;
    background: linear-gradient(to right, #FFB7D5, #F4C49A);
    border-radius: 4px;
  }

  /* Redes sociales */
  .social-row { display: flex; gap: 14px; flex-wrap: wrap; }

  .social-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FFF8F0;
    border: 2.5px solid #F4C49A;
    border-radius: 50px;
    padding: 10px 20px;
    box-shadow: 3px 3px 0px #F4C49A;
  }
  .social-icon { font-size: 22px; }
  .social-info {}
  .social-platform { font-size: 10px; font-weight: 800; color: #C47A35; letter-spacing: 1.5px; text-transform: uppercase; }
  .social-user { font-size: 15px; font-weight: 800; color: #7A5030; }

  /* Panel derecho */
  .right-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeSlideRight 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes fadeSlideRight {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  /* Tarjeta resumen */
  .summary-card {
    background: #FFF8F0;
    border: 3px solid #F4C49A;
    border-radius: 32px;
    padding: 36px 44px;
    text-align: center;
    box-shadow: 6px 6px 0px #F4C49A;
    min-width: 380px;
  }

  .summary-title {
    font-family: 'Pacifico', cursive;
    font-size: 16px;
    color: #D4679A;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-box {
    background: #FFFAF5;
    border: 1.5px solid #F4C49A;
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
  }

  .stat-icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .stat-value { font-family: 'Pacifico', cursive; font-size: 36px; color: #C47A35; line-height: 1; }
  .stat-label { font-size: 11px; font-weight: 800; color: #C4956A; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

  .objetivo-box {
    background: #FFF0F7;
    border: 1.5px solid #FFB7D5;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    color: #8B4060;
    line-height: 1.5;
    text-align: left;
  }

  .objetivo-label {
    font-size: 10px;
    font-weight: 800;
    color: #D4A0BC;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .cat-bottom {
    font-size: 52px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  /* Oculto por defecto */
  body.hidden-state .main { opacity: 0; pointer-events: none; }
  body.visible-state .main { opacity: 1; transition: opacity 0.8s ease; }
</style>
</head>
<body class="visible-state">

<div class="bg-dots"></div>
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="floaties">
  <div class="floaty">🌸</div>
  <div class="floaty">✨</div>
  <div class="floaty">💛</div>
  <div class="floaty">🌷</div>
  <div class="floaty">⭐</div>
  <div class="floaty">🍵</div>
  <div class="floaty">🌼</div>
  <div class="floaty">💖</div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="channel-badge">
      <span>🐱</span>
      <p>elizabethidalgodg</p>
    </div>

    <div class="main-title">
      thanks for<br><span class="orange">coworking~</span>
    </div>

    <div class="decorative-line"></div>

    <div class="subtitle" id="mensajeFin">
      ¡Gracias por trabajar conmigo hoy! Nos vemos en el próximo stream 🌸
    </div>

    <div class="social-row">
      <div class="social-card">
        <span class="social-icon">📷</span>
        <div class="social-info">
          <div class="social-platform">Instagram</div>
          <div class="social-user">_elihidalgo</div>
        </div>
      </div>
      <div class="social-card">
        <span class="social-icon">🎮</span>
        <div class="social-info">
          <div class="social-platform">Twitch</div>
          <div class="social-user">elizabethidalgodg</div>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="summary-card">
      <div class="summary-title">resumen de hoy ✨</div>
      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-icon">🍅</span>
          <div class="stat-value" id="statPomodoros">0</div>
          <div class="stat-label">pomodoros</div>
        </div>
        <div class="stat-box">
          <span class="stat-icon">👥</span>
          <div class="stat-value" id="statPresentes">0</div>
          <div class="stat-label">presentes</div>
        </div>
        <div class="stat-box">
          <span class="stat-icon">✅</span>
          <div class="stat-value" id="statTareas">0</div>
          <div class="stat-label">tareas</div>
        </div>
        <div class="stat-box">
          <span class="stat-icon">⏱</span>
          <div class="stat-value" id="statHoras">0h</div>
          <div class="stat-label">trabajadas</div>
        </div>
      </div>
      <div class="objetivo-box">
        <div class="objetivo-label">objetivo de hoy</div>
        <div id="statObjetivo">—</div>
      </div>
    </div>
    <div class="cat-bottom">🐱</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const TWITCH_CHANNEL = 'elizabethidalgodg';
  const TU_USUARIO     = 'elizabethidalgodg';

  // Contadores del stream
  let pomodoros  = 0;
  let presentes  = 0;
  let tareas     = 0;
  let minutos    = 0;
  let objetivo   = '—';
  let timerMin   = null;

  // Contar minutos trabajados
  timerMin = setInterval(() => { minutos++; }, 60000);

  function updateStats() {
    document.getElementById('statPomodoros').textContent = pomodoros;
    document.getElementById('statPresentes').textContent = presentes;
    document.getElementById('statTareas').textContent    = tareas;
    const h = Math.floor(minutos / 60);
    const m = minutos % 60;
    document.getElementById('statHoras').textContent = h > 0 ? h + 'h ' + m + 'm' : m + 'm';
    document.getElementById('statObjetivo').textContent = objetivo;
  }

  function handleCommand(user, msg) {
    const raw   = msg.trim();
    const lower = raw.toLowerCase();

    // Activar pantalla de fin
    if ((lower === '!bye' || lower === '!fin') && user === TU_USUARIO) {
      clearInterval(timerMin);
      updateStats();
    }

    // Contar pomodoros completados
    if (lower === '!inicio' && user === TU_USUARIO) {
      // se cuenta cuando termina, aquí solo trackeo
    }

    // Contar presentes
    if (lower === '!presente') presentes++;

    // Contar tareas completadas
    if (lower.startsWith('!listo ')) tareas++;

    // Guardar objetivo
    if (lower.startsWith('!objetivo ') && user === TU_USUARIO) {
      objetivo = raw.slice(10).trim();
    }

    // Contar pomodoros — cuando alguien escribe !fin después de trabajar
    if (lower === '!descanso' && user === TU_USUARIO) pomodoros++;
  }

  function connectToChat() {
    const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
    ws.onopen = () => {
      ws.send('PASS oauth:notoken');
      ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
      ws.send('JOIN #' + TWITCH_CHANNEL);
    };
    ws.onmessage = (event) => {
      const raw = event.data;
      if (raw.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }
      const match = raw.match(/:(\w+)!\w+@\w+\.tmi\.twitch\.tv PRIVMSG #\S+ :(.+)/);
      if (match) handleCommand(match[1].toLowerCase(), match[2].trim());
    };
    ws.onclose = () => setTimeout(connectToChat, 5000);
  }

  connectToChat();
  updateStats();

});
</script>
</body>
</html>
