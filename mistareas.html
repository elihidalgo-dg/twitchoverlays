<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Nunito', sans-serif;
    padding: 4px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  #card {
    background: #FFF8F0;
    border: 3px solid #F4C49A;
    border-radius: 24px;
    padding: 14px 16px;
    width: 260px;
    height: 400px;
    box-shadow: 4px 4px 0px #F4C49A;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  #header { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  #catDeco { font-size: 18px; }
  #title { font-size: 12px; font-weight: 800; color: #C47A35; letter-spacing: 2px; text-transform: uppercase; }
  #progressWrap {
    background: #FDDCB5;
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 4px;
    border: 1px solid #F4C49A;
  }
  #progressBar {
    height: 100%;
    background: #C47A35;
    border-radius: 20px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  #progressLabel { font-size: 10px; font-weight: 700; color: #C47A35; text-align: right; margin-bottom: 10px; }
  #taskList { 
   display: flex; 
    flex-direction: column; 
    gap: 5px;
  max-height: 200px;
  overflow-y: hidden;
  scrollbar-behavior: smooth;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: #FFFAF5;
    border: 1.5px solid #F4C49A;
    border-radius: 10px;
    padding: 7px 10px;
    animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideIn {
    from { transform: translateX(-10px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .task-item.done { background: #F5F0E8; border-color: #DDD0BC; }
  .task-num {
    font-size: 10px; font-weight: 800; color: #F4C49A;
    background: #FDDCB5; border: 1px solid #F4C49A;
    border-radius: 6px; min-width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .task-item.done .task-num { background: #C47A35; border-color: #C47A35; color: #FFF8F0; }
  .task-text { font-size: 12px; font-weight: 700; color: #7A5030; line-height: 1.4; word-break: break-word; flex: 1; }
  .task-item.done .task-text { text-decoration: line-through; color: #B8A090; }
  .task-check { font-size: 13px; flex-shrink: 0; }
  #emptyMsg { font-size: 11px; font-weight: 700; color: #D4B090; text-align: center; padding: 10px 0 4px; }
</style>
</head>
<body>
<div id="card">
  <div id="header">
    <span id="catDeco">🐱</span>
    <span id="title">mis tareas</span>
  </div>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <div id="progressLabel">0 / 0 completadas</div>
  <div id="taskList"></div>
  <div id="emptyMsg">escribe !tarea + tu tarea ✨</div>
</div>

<script>
const TWITCH_CHANNEL = 'elizabethidalgodg';
const TU_USUARIO     = 'elizabethidalgodg';

let tasks = [];

function renderTasks() {
  const list  = document.getElementById('taskList');
  const empty = document.getElementById('emptyMsg');
  const bar   = document.getElementById('progressBar');
  const label = document.getElementById('progressLabel');
  list.innerHTML = '';
  if (tasks.length === 0) {
    empty.style.display = 'block';
    bar.style.width     = '0%';
    label.textContent   = '0 / 0 completadas';
    return;
  }
  empty.style.display = 'none';
  const done = tasks.filter(t => t.done).length;
  bar.style.width   = Math.round((done / tasks.length) * 100) + '%';
  label.textContent = done + ' / ' + tasks.length + ' completadas';
  tasks.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'task-item' + (t.done ? ' done' : '');
    item.innerHTML =
      '<div class="task-num">' + (i + 1) + '</div>' +
      '<div class="task-text">' + t.text + '</div>' +
      (t.done ? '<div class="task-check">✅</div>' : '');
    list.appendChild(item);
   function autoScroll() {
  if (list.scrollTop + list.clientHeight >= list.scrollHeight) {
    list.scrollTop = 0;
  } else {
    list.scrollTop += 1;
  }
}
setInterval(autoScroll, 30);
  });
}

function handleCommand(user, msg) {
  const raw   = msg.trim();
  const lower = raw.toLowerCase();
  if (lower.startsWith('!tarea ') && user === TU_USUARIO) {
    const text = raw.slice(7).trim();
    if (text) tasks.push({ text, done: false });
  } else if (lower.startsWith('!listo ') && user === TU_USUARIO) {
    const n = parseInt(raw.slice(7).trim());
    if (!isNaN(n) && tasks[n - 1]) tasks[n - 1].done = true;
  } else if (lower.startsWith('!borrar ') && user === TU_USUARIO) {
    const n = parseInt(raw.slice(8).trim());
    if (!isNaN(n) && tasks[n - 1]) tasks.splice(n - 1, 1);
  } else if (lower === '!reset' && user === TU_USUARIO) {
    tasks = [];
  }
  renderTasks();
}

function connectToChat() {
  const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws.onopen = () => {
    ws.send('PASS oauth:notoken');
    ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
    ws.send('JOIN #' + TWITCH_CHANNEL);
  };
  ws.onmessage = (event) => {
    const raw = event.data;
    if (raw.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }
    const match = raw.match(/:(\w+)!\w+@\w+\.tmi\.twitch\.tv PRIVMSG #\S+ :(.+)/);
    if (match) handleCommand(match[1].toLowerCase(), match[2].trim());
  };
  ws.onclose = () => setTimeout(connectToChat, 5000);
}

renderTasks();
connectToChat();
</script>
</body>
</html>
